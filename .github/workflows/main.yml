name: Match Schedule Bot

on:
  schedule:
    # Run every 10 minutes
    # Bot logic determines what to send based on current time (UTC+7)
    # - 00:00 UTC+7 (17:00 UTC): sends overview
    # - Every run: checks for upcoming matches and sends reminders
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

# Prevent concurrent runs to avoid history conflicts
concurrency:
  group: match-schedule-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set timezone to Asia/Jakarta
      run: |
        sudo timedatectl set-timezone Asia/Jakarta
        echo "Current time: $(date)"

    - name: Pull latest history
      run: |
        git pull --rebase origin main || true

    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: |
        python sch.py

    - name: Save history to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add send_history.json
        git diff --cached --quiet || (git commit -m "Update send history [skip ci]" && git push)
